name: 29878 - Testiranje

on:
  push:
    branches:
      - main

jobs:

  preveri-teste:
    name: Preveri obstoj testnih skript
    runs-on: self-hosted

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Iskanje testnih datotek
        run: |
          echo "Iščem testne datoteke v repozitoriju..."

          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" 2>napaka.txt)

          if [ -z "$TEST_FILES" ]; then
            echo "NAPAKA: Ni testnih datotek!" | tee napaka.txt
            exit 1
          else
            echo "$TEST_FILES"
            > napaka.txt
          fi

      - name: Naloži artefakt napaka.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napaka-txt
          path: napaka.txt


  pozeni-teste:
    name: Pripravi okolje in poženi teste
    runs-on: self-hosted
    needs: preveri-teste

    strategy:
      matrix:
        python-version: ["3.13"]   # OK za VM (lahko kasneje razširiš)

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Prenesi artefakt
        uses: actions/download-artifact@v4
        with:
          name: napaka-txt

      - name: Preveri napake
        run: |
          if [ -s napaka.txt ]; then
            cat napaka.txt
            exit 1
          fi

      - name: Nastavi okolje + odvisnosti
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pytest-cov

          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt
          fi

      - name: Poženi teste
        run: |
          python3 -m pytest -vv --cov=. --cov-report=term-missing

      - name: Upload rezultat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napaka-txt-po-testih
          path: napaka.txt